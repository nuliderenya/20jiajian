<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>行测小助手 · 减法</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #2e2a26;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 8px;
      touch-action: manipulation;
    }
    .app {
      max-width: 400px;
      width: 100%;
      background: #1e1b18;
      border-radius: 36px;
      padding: 22px 16px 26px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5);
      border: 1px solid #4a4038;
      color: #f0e7de;
    }

    /* 顶部栏：计时 + 重开 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .timer-box {
      background: #0f0e0c;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 1.6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #ffd966;
      box-shadow: inset 0 0 4px #000, 0 3px 0 #3a322b;
      border-bottom: 1px solid #6b5d52;
    }
    .restart-btn {
      background: #4a6b5d;
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 0 #2e4239;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #6f8f7d;
      transition: 0.05s;
    }
    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #2e4239;
    }

    /* 正确率/题号 */
    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
      font-weight: 600;
      color: #cbbeb2;
    }
    .score-badge {
      background: #5a4e44;
      padding: 5px 18px;
      border-radius: 30px;
      color: #f2e0c9;
    }

    /* 题目卡片 */
    .question-panel {
      background: #28221d;
      border-radius: 32px;
      padding: 24px 12px 20px;
      margin-bottom: 20px;
      box-shadow: inset 0 2px 6px #0a0806, 0 8px 0 #13100e;
      border-bottom: 2px solid #5f5247;
    }
    .equation {
      text-align: center;
      font-size: 4.5rem;
      font-weight: 800;
      color: #f3e5d5;
      text-shadow: 0 4px 0 #3b3128;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    /* 输入框 + 唤起原生键盘 */
    .input-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .native-input {
      flex: 1;
      background: #0e0c0a;
      border: 2px solid #5e5349;
      border-radius: 50px;
      padding: 16px 20px;
      font-size: 2.4rem;
      font-weight: 700;
      color: #f0dbb8;
      text-align: center;
      box-shadow: inset 0 4px 8px #00000055, 0 4px 0 #2a231e;
      outline: none;
      font-variant-numeric: tabular-nums;
      caret-color: #c9a87c;
    }
    .native-input:focus {
      border-color: #c9a87c;
      background: #1a1511;
    }
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .small-btn {
      background: #3d352e;
      border: none;
      border-radius: 30px;
      padding: 12px 14px;
      font-size: 1.3rem;
      font-weight: bold;
      color: #efdbca;
      box-shadow: 0 3px 0 #221d19;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #695e54;
      min-width: 70px;
      transition: 0.05s;
    }
    .small-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #221d19;
    }

    /* 确定按钮 */
    .confirm-btn {
      width: 100%;
      background: #7d9f85;
      border: none;
      border-radius: 60px;
      padding: 18px 10px;
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
      box-shadow: 0 7px 0 #44634e;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #a1c0a9;
      transition: 0.05s;
      margin-bottom: 12px;
    }
    .confirm-btn:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #3a5443;
    }

    /* 底部进度 */
    .progress-footer {
      text-align: center;
      font-size: 1.1rem;
      color: #b7a99b;
      font-weight: 500;
    }

    /* 错误弹窗 */
    .toast-popup {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -30%);
      background: #b34a4a;
      color: white;
      font-weight: bold;
      font-size: 2rem;
      padding: 16px 36px;
      border-radius: 60px;
      box-shadow: 0 15px 25px black;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.12s;
      pointer-events: none;
      white-space: nowrap;
      border: 2px solid #ffb4b4;
    }
    .toast-popup.show { opacity: 1; }

    /* 结束模态 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
      padding: 16px;
    }
    .modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: #2d2722;
      max-width: 380px;
      width: 100%;
      border-radius: 40px;
      padding: 24px 18px 18px;
      box-shadow: 0 30px 40px black;
      border: 1px solid #6a5d52;
      color: #ede0d4;
    }
    .modal-title {
      font-size: 1.9rem;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
    }
    .detail-list {
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 22px;
      border-radius: 24px;
      background: #1f1a16;
      padding: 8px 6px;
    }
    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      font-size: 1.2rem;
      border-bottom: 1px solid #4e443c;
    }
    .time-col {
      background: #40362f;
      padding: 4px 14px;
      border-radius: 30px;
      font-family: monospace;
      color: #eaceb0;
    }
    .modal-actions {
      display: flex;
      gap: 14px;
    }
    .modal-btn {
      flex: 1;
      padding: 16px 8px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.3rem;
      border: none;
      box-shadow: 0 5px 0 #2a221d;
      cursor: pointer;
      background: #554a41;
      color: #f2e0cf;
    }
    .modal-btn.primary {
      background: #6d8f7a;
      color: white;
      box-shadow: 0 5px 0 #3d5e4c;
    }
    .modal-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #332b25;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- 顶部：计时 + 重开（独立） -->
  <div class="top-bar">
    <div class="timer-box" id="timerDisplay">00:00</div>
    <button class="restart-btn" id="restartBtn">🔄 重开</button>
  </div>

  <!-- 题号 & 正确数 -->
  <div class="info-row">
    <span id="questionCounter">第1/10题</span>
    <span class="score-badge" id="scoreDisplay">✅ 0/10</span>
  </div>

  <!-- 题目区域 -->
  <div class="question-panel">
    <div class="equation" id="equationText">15 − 7 = ?</div>

    <!-- 输入框（点击唤起原生键盘） + 清空/退格 -->
    <div class="input-section">
      <input type="text" inputmode="numeric" id="answerInput" class="native-input" placeholder="—" value="" maxlength="2" autocomplete="off">
      <div class="action-btns">
        <button class="small-btn" id="clearBtn">清空</button>
        <button class="small-btn" id="backspaceBtn">退格</button>
      </div>
    </div>

    <!-- 确定按钮 -->
    <button class="confirm-btn" id="submitBtn">✅ 确定</button>
    <div class="progress-footer" id="completionStat">✨ 点击重开开始</div>
  </div>
</div>

<!-- 错误弹窗 -->
<div class="toast-popup" id="errorToast">❌ 答错了</div>

<!-- 完成模态 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="modal-title">📋 答题详情</div>
    <div class="detail-list" id="detailList"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modalRestart">🔄 重开</button>
      <button class="modal-btn" id="modalClose">🚪 不来了</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // DOM
    const timerDisplay = document.getElementById('timerDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const questionCounter = document.getElementById('questionCounter');
    const equationText = document.getElementById('equationText');
    const answerInput = document.getElementById('answerInput');
    const clearBtn = document.getElementById('clearBtn');
    const backspaceBtn = document.getElementById('backspaceBtn');
    const submitBtn = document.getElementById('submitBtn');
    const restartBtn = document.getElementById('restartBtn');
    const completionStat = document.getElementById('completionStat');
    const errorToast = document.getElementById('errorToast');
    const resultModal = document.getElementById('resultModal');
    const detailList = document.getElementById('detailList');
    const modalRestart = document.getElementById('modalRestart');
    const modalClose = document.getElementById('modalClose');

    // 状态
    let questions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let quizActive = false;
    let quizFinished = false;
    let answeredCurrent = false;
    
    let totalTimerInterval = null;
    let totalSeconds = 0;
    let questionStartTime = null;
    let questionTimeRecords = [];
    let toastTimer = null;

    // 生成题目 (10-19 减 1-9)
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 10) + 10;
      let num2 = Math.floor(Math.random() * 9) + 1;
      while (num2 > num1) num2 = Math.floor(Math.random() * 9) + 1;
      return { num1, num2, answer: num1 - num2 };
    }
    function generateSet(count=10) { return Array.from({length:count}, generateQuestion); }

    function displayQuestion() {
      if (!questions.length) return;
      const q = questions[currentIndex];
      equationText.textContent = `${q.num1} − ${q.num2} = ?`;
      questionCounter.textContent = `第${currentIndex+1}/10题`;
    }

    function updateScoreUI() {
      scoreDisplay.textContent = `✅ ${correctCount}/10`;
    }

    function formatTime(sec) {
      const m = Math.floor(sec/60).toString().padStart(2,'0');
      const s = (sec%60).toString().padStart(2,'0');
      return `${m}:${s}`;
    }

    function updateTimerUI() { timerDisplay.textContent = formatTime(totalSeconds); }
    function stopTotalTimer() { if(totalTimerInterval) clearInterval(totalTimerInterval); totalTimerInterval=null; }
    function startTotalTimer() {
      stopTotalTimer();
      totalTimerInterval = setInterval(() => {
        if (quizActive && !quizFinished) { totalSeconds++; updateTimerUI(); }
      }, 1000);
    }

    function markQuestionStart() { questionStartTime = Date.now(); }
    function getQuestionElapsed() {
      if(!questionStartTime) return 0;
      return Math.round((Date.now() - questionStartTime)/1000 *10)/10;
    }

    function showErrorToast() {
      if(toastTimer) clearTimeout(toastTimer);
      errorToast.classList.add('show');
      toastTimer = setTimeout(() => errorToast.classList.remove('show'), 150);
    }

    function finishQuizAndShowModal() {
      quizFinished = true; quizActive = false; stopTotalTimer();
      const accuracy = (correctCount/10)*100;
      const accStr = accuracy%1===0 ? accuracy.toFixed(0) : accuracy.toFixed(1);
      completionStat.textContent = `🏁 正确率 ${accStr}% · 总用时 ${formatTime(totalSeconds)}`;
      
      detailList.innerHTML = '';
      questionTimeRecords.forEach((rec, idx) => {
        const div = document.createElement('div'); div.className='detail-item';
        const q = rec.question;
        div.innerHTML = `<span>${idx+1}. ${q.num1}−${q.num2}=${q.answer} ${rec.isCorrect?'✅':'❌'}</span>
                         <span class="time-col">${rec.timeSpent.toFixed(1)}秒</span>`;
        detailList.appendChild(div);
      });
      resultModal.classList.add('show');
    }

    function goToNextQuestion() {
      if (currentIndex < 9) {
        currentIndex++;
        answeredCurrent = false;
        answerInput.value = '';
        displayQuestion();
        markQuestionStart();
        completionStat.textContent = `📋 已完成 ${currentIndex}/10 题`;
        answerInput.focus();
      }
    }

    function handleSubmit() {
      if (!quizActive || quizFinished || answeredCurrent) return;
      const val = answerInput.value.trim();
      if (val === '') return;
      const userAnswer = Number(val);
      if (isNaN(userAnswer) || !Number.isInteger(userAnswer) || userAnswer < 0) {
        answerInput.value = ''; return;
      }
      
      const q = questions[currentIndex];
      const isCorrect = (userAnswer === q.answer);
      const timeSpent = getQuestionElapsed();
      questionTimeRecords[currentIndex] = { question: q, isCorrect, timeSpent };
      answeredCurrent = true;
      
      if (isCorrect) { correctCount++; updateScoreUI(); }
      else { showErrorToast(); }
      
      if (currentIndex === 9) { finishQuizAndShowModal(); }
      else { goToNextQuestion(); }
    }

    function resetAndStart() {
      stopTotalTimer(); resultModal.classList.remove('show');
      questions = generateSet(10);
      currentIndex = 0; correctCount = 0; quizFinished = false; quizActive = true;
      answeredCurrent = false; questionTimeRecords = [];
      totalSeconds = 0; updateTimerUI();
      
      displayQuestion(); updateScoreUI();
      answerInput.value = ''; answerInput.disabled = false;
      completionStat.textContent = `📋 进行中 · 0/10`;
      markQuestionStart(); startTotalTimer();
      answerInput.focus();
    }

    // 清空输入
    function clearInput() { if(quizActive&&!quizFinished&&!answeredCurrent) { answerInput.value = ''; answerInput.focus(); } }
    // 退格
    function backspaceInput() {
      if(quizActive&&!quizFinished&&!answeredCurrent) {
        answerInput.value = answerInput.value.slice(0,-1);
        answerInput.focus();
      }
    }

    // 初始化
    function init() {
      // 初始未激活
      questions = generateSet(10);
      displayQuestion(); updateScoreUI();
      quizActive = false; quizFinished = false;
      completionStat.textContent = '✨ 点击重开开始';
      answerInput.disabled = true;
      
      clearBtn.addEventListener('click', clearInput);
      backspaceBtn.addEventListener('click', backspaceInput);
      submitBtn.addEventListener('click', handleSubmit);
      restartBtn.addEventListener('click', resetAndStart);
      modalRestart.addEventListener('click', resetAndStart);
      modalClose.addEventListener('click', ()=> resultModal.classList.remove('show'));
      
      // 限制只能输入数字
      answerInput.addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length > 2) this.value = this.value.slice(0,2);
      });
      
      // 激活时启用输入框
      const originalReset = resetAndStart;
      window.resetAndStart = function() {
        answerInput.disabled = false;
        originalReset();
      };
      // 绑定修正
      restartBtn.onclick = ()=> { answerInput.disabled = false; resetAndStart(); };
      modalRestart.onclick = ()=> { answerInput.disabled = false; resetAndStart(); };
    }

    init();
  })();
</script>
</body>
</html>
