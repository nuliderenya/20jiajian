<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🍎 减法口算 · 差为一位数</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #ece2d7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      padding: 6px;
      touch-action: manipulation;
    }

    .app {
      max-width: 400px;
      width: 100%;
      background: #fdf8f2;
      border-radius: 28px;
      box-shadow: 0 20px 35px rgba(60, 40, 20, 0.15);
      padding: 14px 12px 18px;
      border: 1px solid #e2d0be;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .header h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #4a392b;
    }

    .timer-badge {
      background: #d6c6b6;
      padding: 5px 12px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      color: #2b2018;
      box-shadow: inset 0 1px 4px #fff8, 0 3px 0 #a48e7a;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .progress-text {
      font-size: 1rem;
      font-weight: 600;
      color: #6b5542;
    }

    .correct-badge {
      background: #5f7b6b;
      color: white;
      padding: 3px 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 3px 0 #3b5547;
    }

    .question-card {
      background: #fffbf7;
      border-radius: 24px;
      padding: 12px 10px 14px;
      box-shadow: inset 0 2px 6px #fff, 0 8px 12px -6px rgba(80, 50, 25, 0.1);
      border: 1px solid #e2cfbc;
      margin-bottom: 6px;
    }

    .equation-big {
      text-align: center;
      font-size: 3.2rem;
      font-weight: 800;
      color: #2c221c;
      line-height: 1.2;
      margin: 0 0 8px;
      background: #f3e8de;
      padding: 6px 4px;
      border-radius: 36px;
      box-shadow: inset 0 3px 4px #ddd0c0, 0 4px 0 #b6a18b;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0 8px;
    }

    .restart-btn {
      background: #bc9a7a;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 10px 12px;
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 4px 0 #735e4c;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #a58364;
      transition: 0.05s;
      white-space: nowrap;
      min-width: 72px;
    }

    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5f4a38;
    }

    .input-display {
      background: #e7dbcf;
      border-radius: 40px;
      padding: 6px 14px;
      flex: 1;
      box-shadow: inset 0 3px 6px #cdbcab, 0 3px 0 #9e8b78;
      min-height: 3.2rem;
      display: flex;
      align-items: center;
    }

    .input-value {
      font-size: 2rem;
      font-weight: 700;
      color: #1e1813;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
    }

    .placeholder {
      color: #7f6e5e;
      font-size: 1.5rem;
      opacity: 0.6;
    }

    .backspace-btn {
      background: #f1e7de;
      border: none;
      border-radius: 40px;
      padding: 10px 14px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #3e3124;
      box-shadow: 0 4px 0 #ad9a87;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #dacbbb;
      transition: 0.05s;
      min-width: 60px;
    }

    .backspace-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #9a8775;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 6px;
    }

    .key-btn {
      background: #ffffff;
      border: none;
      border-radius: 50px;
      padding: 12px 4px;
      font-size: 1.6rem;
      font-weight: 700;
      color: #2e241b;
      box-shadow: 0 4px 0 #b09c88, 0 2px 6px rgba(0,0,0,0.05);
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid #ddcdbc;
      transition: 0.05s;
      text-align: center;
    }

    .key-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #9b8874;
    }

    .key-confirm {
      background: #6d8f7a;
      color: white;
      box-shadow: 0 4px 0 #3d5e4c;
      border-color: #5a7b68;
      font-size: 1.4rem;
    }

    .key-placeholder {
      visibility: hidden;
      pointer-events: none;
      box-shadow: none;
      background: transparent;
      border: 1px solid transparent;
    }

    .toast-popup {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -30%);
      background: #c05a5a;
      color: white;
      font-weight: bold;
      font-size: 1.6rem;
      padding: 14px 28px;
      border-radius: 50px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.12s;
      pointer-events: none;
      white-space: nowrap;
      border: 2px solid #ffdab9;
    }

    .toast-popup.show {
      opacity: 1;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30, 20, 10, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
      padding: 16px;
    }

    .modal-overlay.show {
      visibility: visible;
      opacity: 1;
    }

    .modal-card {
      background: #fef7f0;
      max-width: 360px;
      width: 100%;
      border-radius: 36px;
      padding: 18px 14px 16px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.2);
      border: 2px solid #d6c0ab;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #3b2c1e;
      margin-bottom: 12px;
      text-align: center;
    }

    .detail-list {
      max-height: 240px;
      overflow-y: auto;
      margin-bottom: 16px;
      border-radius: 24px;
      background: #f3e9df;
      padding: 6px 4px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 1rem;
      border-bottom: 1px solid #dacbbc;
      font-weight: 500;
    }

    .time-col {
      font-family: monospace;
      background: #e3d4c4;
      padding: 2px 8px;
      border-radius: 30px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-btn {
      flex: 1;
      padding: 12px 6px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      box-shadow: 0 4px 0 #9b8874;
      cursor: pointer;
      touch-action: manipulation;
      background: #e1d3c5;
      color: #2f241b;
      transition: 0.05s;
      border: 1px solid #cbb9a7;
    }

    .modal-btn.primary {
      background: #7a9a83;
      color: white;
      box-shadow: 0 4px 0 #486353;
    }

    .modal-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #7f6b58;
    }

    .stat-footer {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      background: #ddd0c1;
      padding: 6px 14px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h2>🧸 减法</h2>
    <div class="timer-badge" id="timerDisplay">00:00</div>
  </div>

  <div class="score-row">
    <span class="progress-text" id="questionCounter">第1/10题</span>
    <span class="correct-badge" id="scoreDisplay">✅ 0/10</span>
  </div>

  <div class="question-card">
    <div class="equation-big" id="equationText">15 − 7 = ?</div>

    <div class="input-row">
      <button class="restart-btn" id="restartBtn">🔄 重开</button>
      <div class="input-display">
        <div class="input-value" id="inputDisplay"><span class="placeholder">—</span></div>
      </div>
      <button class="backspace-btn" id="backspaceBtn" title="退格">←</button>
    </div>

    <div class="keyboard" id="keyboardGrid"></div>
  </div>

  <div class="stat-footer">
    <span id="completionStat">✨ 点击重开开始</span>
    <span>正确率 <span id="accuracySpan">—</span>%</span>
  </div>
</div>

<!-- 错误弹窗 -->
<div class="toast-popup" id="errorToast">❌ 答错了</div>

<!-- 结果模态框 -->
<div class="modal-overlay" id="resultModal">
  <div class="modal-card">
    <div class="modal-title">📋 练习报告</div>
    <div class="detail-list" id="detailList"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modalRestart">🔄 重开</button>
      <button class="modal-btn" id="modalClose">🚪 不来了</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    const timerDisplay = document.getElementById('timerDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const questionCounter = document.getElementById('questionCounter');
    const equationText = document.getElementById('equationText');
    const inputDisplay = document.getElementById('inputDisplay');
    const backspaceBtn = document.getElementById('backspaceBtn');
    const restartBtn = document.getElementById('restartBtn');
    const completionStat = document.getElementById('completionStat');
    const accuracySpan = document.getElementById('accuracySpan');
    const errorToast = document.getElementById('errorToast');
    const keyboardGrid = document.getElementById('keyboardGrid');
    const resultModal = document.getElementById('resultModal');
    const detailList = document.getElementById('detailList');
    const modalRestart = document.getElementById('modalRestart');
    const modalClose = document.getElementById('modalClose');

    let questions = [];
    let currentIndex = 0;
    let correctCount = 0;
    let quizActive = false;
    let quizFinished = false;
    let answeredCurrent = false;
    let currentInput = '';
    
    let totalTimerInterval = null;
    let totalSeconds = 0;
    let questionStartTime = null;
    let questionTimeRecords = [];
    let toastTimer = null;

    // 修改后的题目生成：两位数(11-19)减一位数(1-9)，差必须在1-9之间
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 9) + 11; // 11~19
      // 计算可能的减数范围：要满足 num1 - num2 在 1~9，即 num2 ∈ [num1-9, num1-1] 且 num2 在1~9之间
      const minNum2 = Math.max(1, num1 - 9);
      const maxNum2 = Math.min(9, num1 - 1);
      let num2;
      if (minNum2 > maxNum2) {
        // 如果没有符合条件的，回退到安全值（理论上11-19都应该有解，但以防万一）
        num2 = Math.max(1, Math.min(9, num1 - 1));
      } else {
        num2 = Math.floor(Math.random() * (maxNum2 - minNum2 + 1)) + minNum2;
      }
      return { num1, num2, answer: num1 - num2 };
    }

    function generateSet(count = 10) {
      return Array.from({ length: count }, generateQuestion);
    }

    function displayQuestion() {
      if (!questions.length || currentIndex >= questions.length) return;
      const q = questions[currentIndex];
      equationText.textContent = `${q.num1} − ${q.num2} = ?`;
      questionCounter.textContent = `第${currentIndex+1}/10题`;
    }

    function updateScoreUI() {
      scoreDisplay.textContent = `✅ ${correctCount}/10`;
      const acc = (correctCount / 10) * 100;
      accuracySpan.textContent = (acc % 1 === 0 ? acc.toFixed(0) : acc.toFixed(1));
    }

    function refreshInputDisplay() {
      if (currentInput === '') {
        inputDisplay.innerHTML = '<span class="placeholder">—</span>';
      } else {
        inputDisplay.textContent = currentInput;
      }
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateTotalTimerUI() {
      timerDisplay.textContent = formatTime(totalSeconds);
    }

    function stopTotalTimer() {
      if (totalTimerInterval) clearInterval(totalTimerInterval);
      totalTimerInterval = null;
    }

    function startTotalTimer() {
      stopTotalTimer();
      totalTimerInterval = setInterval(() => {
        if (quizActive && !quizFinished) {
          totalSeconds++;
          updateTotalTimerUI();
        }
      }, 1000);
    }

    function markQuestionStart() {
      questionStartTime = Date.now();
    }

    function getQuestionElapsedSeconds() {
      if (!questionStartTime) return 0;
      const elapsed = (Date.now() - questionStartTime) / 1000;
      return Math.round(elapsed * 10) / 10;
    }

    function showErrorToast() {
      if (toastTimer) clearTimeout(toastTimer);
      errorToast.classList.add('show');
      toastTimer = setTimeout(() => {
        errorToast.classList.remove('show');
      }, 150);
    }

    function finishQuizAndShowModal() {
      quizFinished = true;
      quizActive = false;
      stopTotalTimer();
      
      const accuracy = (correctCount / 10) * 100;
      const accStr = accuracy % 1 === 0 ? accuracy.toFixed(0) : accuracy.toFixed(1);
      completionStat.textContent = `🏁 完成 · 正确率 ${accStr}% · 总用时 ${formatTime(totalSeconds)}`;
      
      detailList.innerHTML = '';
      questionTimeRecords.forEach((record, idx) => {
        const item = document.createElement('div');
        item.className = 'detail-item';
        const q = record.question;
        const isCorrect = record.isCorrect;
        const timeSpent = record.timeSpent.toFixed(1);
        item.innerHTML = `<span>${idx+1}.  ${q.num1} − ${q.num2} = ${q.answer}  ${isCorrect ? '✅' : '❌'}</span>
                          <span class="time-col">${timeSpent}秒</span>`;
        detailList.appendChild(item);
      });
      
      resultModal.classList.add('show');
    }

    function goToNextQuestion() {
      if (currentIndex < 9) {
        currentIndex++;
        answeredCurrent = false;
        currentInput = '';
        refreshInputDisplay();
        displayQuestion();
        markQuestionStart();
        completionStat.textContent = `📋 已完成 ${currentIndex}/10 题`;
      }
    }

    function handleSubmit() {
      if (!quizActive || quizFinished || answeredCurrent) return;
      
      const inputVal = currentInput.trim();
      if (inputVal === '') return;
      const userAnswer = Number(inputVal);
      if (isNaN(userAnswer) || !Number.isInteger(userAnswer) || userAnswer < 0) {
        currentInput = '';
        refreshInputDisplay();
        return;
      }
      
      const q = questions[currentIndex];
      const isCorrect = (userAnswer === q.answer);
      const timeSpent = getQuestionElapsedSeconds();
      
      questionTimeRecords[currentIndex] = {
        question: q,
        isCorrect: isCorrect,
        timeSpent: timeSpent
      };
      
      answeredCurrent = true;
      
      if (isCorrect) {
        correctCount++;
        updateScoreUI();
      } else {
        showErrorToast();
      }
      
      if (currentIndex === 9) {
        finishQuizAndShowModal();
        return;
      } else {
        goToNextQuestion();
      }
    }

    function resetAndStart() {
      stopTotalTimer();
      resultModal.classList.remove('show');
      
      questions = generateSet(10);
      currentIndex = 0;
      correctCount = 0;
      quizFinished = false;
      quizActive = true;
      answeredCurrent = false;
      currentInput = '';
      questionTimeRecords = [];
      
      totalSeconds = 0;
      updateTotalTimerUI();
      
      displayQuestion();
      updateScoreUI();
      refreshInputDisplay();
      completionStat.textContent = `📋 进行中 · 0/10`;
      
      markQuestionStart();
      startTotalTimer();
    }

    function appendDigit(digit) {
      if (!quizActive || quizFinished || answeredCurrent) return;
      if (currentInput.length >= 2) return;
      if (currentInput === '0' && digit === '0') return;
      if (currentInput === '0' && digit !== '0') {
        currentInput = digit;
      } else {
        currentInput += digit;
      }
      refreshInputDisplay();
    }

    function backspaceInput() {
      if (!quizActive || quizFinished || answeredCurrent) return;
      currentInput = currentInput.slice(0, -1);
      refreshInputDisplay();
    }

    function buildKeyboard() {
      const digits = ['1','2','3','4','5','6','7','8','9'];
      keyboardGrid.innerHTML = '';
      
      digits.forEach(d => {
        const btn = document.createElement('button');
        btn.classList.add('key-btn');
        btn.textContent = d;
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          appendDigit(d);
        });
        keyboardGrid.appendChild(btn);
      });
      
      const placeholderBtn = document.createElement('button');
      placeholderBtn.classList.add('key-btn', 'key-placeholder');
      placeholderBtn.textContent = '';
      placeholderBtn.disabled = true;
      keyboardGrid.appendChild(placeholderBtn);
      
      const btn0 = document.createElement('button');
      btn0.classList.add('key-btn');
      btn0.textContent = '0';
      btn0.addEventListener('click', () => appendDigit('0'));
      keyboardGrid.appendChild(btn0);
      
      const confirmBtn = document.createElement('button');
      confirmBtn.classList.add('key-btn', 'key-confirm');
      confirmBtn.textContent = '确定';
      confirmBtn.addEventListener('click', (e) => {
        e.preventDefault();
        handleSubmit();
      });
      keyboardGrid.appendChild(confirmBtn);
    }

    function init() {
      buildKeyboard();
      
      questions = generateSet(10);
      currentIndex = 0;
      correctCount = 0;
      quizActive = false;
      quizFinished = false;
      displayQuestion();
      updateScoreUI();
      refreshInputDisplay();
      completionStat.textContent = '✨ 点击重开开始';
      totalSeconds = 0;
      updateTotalTimerUI();
      
      backspaceBtn.addEventListener('click', backspaceInput);
      
      restartBtn.addEventListener('click', () => {
        resetAndStart();
      });
      
      modalRestart.addEventListener('click', () => {
        resetAndStart();
      });
      
      modalClose.addEventListener('click', () => {
        resultModal.classList.remove('show');
      });
    }

    init();
  })();
</script>
</body>
</html>
